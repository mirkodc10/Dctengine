<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>DCTEAM ESPORT | Official Hub v4.7</title>
    <style>
        @font-face { font-family: 'WareeOblique'; src: url('Waree-Oblique.ttf'); }
        :root { --bg: #000; --accent: #005aff; --text: #fff; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; --border: #222; --danger: #ff4444; }
        
        body { background: var(--bg); color: var(--text); font-family: 'WareeOblique', sans-serif; margin: 0; overflow: hidden; }
        
        /* --- LOGIN --- */
        #login-page { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { text-align: center; width: 320px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #333; color: #fff; font-family: 'WareeOblique'; outline: none; box-sizing: border-box; }
        .btn-blue { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; font-family: 'WareeOblique'; text-transform: uppercase; margin-top: 10px; }

        /* --- DASHBOARD --- */
        #main-dashboard { display: none; height: 100vh; flex-direction: row; }
        .sidebar { width: 250px; border-right: 1px solid var(--border); padding: 30px; display: flex; flex-direction: column; }
        .sidebar img { width: 120px; margin-bottom: 40px; align-self: center; }
        .content { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #0d0d0d, #000); }
        
        .nav-btn { background: none; border: none; color: #555; text-align: left; padding: 12px; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; width: 100%; }
        .nav-btn.active { color: var(--accent); border-left: 2px solid var(--accent); }
        
        /* --- TABELLA --- */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: var(--accent); padding: 15px; border-bottom: 2px solid #222; font-size: 0.7rem; }
        td { padding: 12px 15px; border-bottom: 1px solid #111; font-size: 0.9rem; }
        .flag { width: 22px; vertical-align: middle; margin-right: 8px; border-radius: 2px; }
        
        .btn-action { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 0 5px; opacity: 0.4; transition: 0.3s; }
        .btn-action:hover { opacity: 1; transform: scale(1.2); }
        .btn-edit { color: #fff; }
        .btn-del { color: var(--danger); }

        /* --- HALL OF FAME --- */
        .hof-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 20px; }
        .trophy-card { background: linear-gradient(145deg, #1a1a1a, #050505); border: 1px solid #333; padding: 30px; border-radius: 15px; text-align: center; position: relative; transition: 0.4s; }
        .trophy-card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .pos-giant { font-size: 4.5rem; font-weight: 900; margin: 0; line-height: 1; font-style: italic; }
        .p-1 { color: var(--gold); } .p-2 { color: var(--silver); } .p-3 { color: var(--bronze); }
        .driver-name { font-size: 1.4rem; margin: 15px 0 5px; text-transform: uppercase; }
        .race-date { font-size: 0.8rem; color: #555; margin-top: 15px; border-top: 1px solid #222; padding-top: 10px; }

        /* --- MODALI --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: #0c0c0c; padding: 35px; border: 1px solid var(--accent); width: 480px; max-height: 90vh; overflow-y: auto; box-sizing: border-box; }
        .check-container { background: #111; padding: 15px; border-radius: 5px; margin: 15px 0; display: flex; justify-content: space-around; border: 1px solid #222; }
        
        #loading { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); color: white; z-index: 3000; align-items: center; justify-content: center; font-style: italic; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="loading">SINCRONIZZAZIONE DCT ENGINE...</div>

    <div id="login-page">
        <div class="login-box">
            <img src="DCT.png" style="width:180px; margin-bottom:30px;">
            <input type="text" id="user" placeholder="DRIVER ID">
            <input type="password" id="pass" placeholder="ACCESS KEY">
            <label style="color:#888; font-size:0.8rem;"><input type="checkbox" id="remember"> RICORDAMI</label>
            <button onclick="checkLogin()" class="btn-blue">ENTRA NELL'HUB</button>
        </div>
    </div>

    <div id="main-dashboard">
        <div class="sidebar">
            <img src="DCT.png">
            <button class="nav-btn active" id="btn-db" onclick="showTab('db')">Database Piloti</button>
            <button class="nav-btn" id="btn-hof" onclick="showTab('hof')">Hall of Fame</button>
            <div style="margin-top: auto; border-top: 1px solid #222; padding-top: 20px;">
                <button class="nav-btn" onclick="openAddModal()">+ Aggiungi Pilota</button>
                <button class="nav-btn" onclick="openModal('mRace')">+ Registra Gara</button>
                <button class="nav-btn" onclick="logout()" style="color:var(--danger); margin-top:10px;">Logout</button>
            </div>
        </div>

        <div class="content">
            <div id="tab-db">
                <h1 style="font-style: italic;">OFFICIAL PILOT DATABASE</h1>
                <table>
                    <thead>
                        <tr><th>NUM</th><th>PILOTA</th><th>NAZ</th><th>CATEGORIA</th><th>PODI</th><th>WIN</th><th>POLE</th><th>GV</th><th>PUNTI</th><th>AZIONI</th></tr>
                    </thead>
                    <tbody id="pBody"></tbody>
                </table>
            </div>
            
            <div id="tab-hof" style="display:none;">
                <h1 style="font-style: italic; color: var(--gold);">HALL OF FAME</h1>
                <div class="hof-grid" id="hofBody"></div>
            </div>
        </div>
    </div>

    <div id="mAdd" class="modal"><div class="modal-content">
        <h2 id="modal-title">NUOVO PILOTA</h2>
        <label style="font-size:0.7rem; color:#666;">NUMERO</label>
        <input type="number" id="n-num" placeholder="es: 46">
        <label style="font-size:0.7rem; color:#666;">PSN ID (Non modificabile in Edit)</label>
        <input type="text" id="n-name" placeholder="es: DCT_Mirko">
        <label style="font-size:0.7rem; color:#666;">NAZIONALITÀ (IT, FR...)</label>
        <input type="text" id="n-nat" placeholder="es: IT">
        <label style="font-size:0.7rem; color:#666;">CATEGORIA</label>
        <select id="n-cat">
            <option>STAR</option><option>ELITE</option><option>PROGOLD</option>
            <option>PROSILVER</option><option>PROAMA</option><option>AMA</option><option>Recluta</option>
        </select>
        <button class="btn-blue" onclick="submitDriver()">SALVA DATI</button>
        <button onclick="closeModal('mAdd')" style="background:none; border:none; color:grey; width:100%; cursor:pointer; margin-top:10px;">Chiudi</button>
    </div></div>

    <div id="mRace" class="modal"><div class="modal-content">
        <h2 style="font-style: italic; color: var(--accent); margin-top:0;">REGISTRA GARA</h2>
        <select id="r-select" onchange="autoFillNum()"></select>
        <input type="text" id="r-num" readonly style="background:#050505; color:var(--accent);">
        <input type="text" id="r-event" placeholder="es: Campionato Invernale">
        <select id="r-track">
            <option value="">Seleziona Circuito...</option>
            <option>Autodromo Nazionale Monza (IT)</option>
            <option>Circuit de Spa-Francorchamps (BE)</option>
            <option>Nürburgring (DE)</option>
            <option>Circuit de la Sarthe (FR)</option>
            <option>Red Bull Ring (AT)</option>
            <option>Brands Hatch (UK)</option>
            <option>Circuit de Barcelona-Catalunya (ES)</option>
            <option>Goodwood Motor Circuit (UK)</option>
            <option>Daytona International Speedway (US)</option>
            <option>Watkins Glen International (US)</option>
            <option>WeatherTech Raceway Laguna Seca (US)</option>
            <option>Michelin Raceway Road Atlanta (US)</option>
            <option>Willow Springs Raceway (US)</option>
            <option>Autódromo de Interlagos (BR)</option>
            <option>Suzuka Circuit (JP)</option>
            <option>Fuji International Speedway (JP)</option>
            <option>Autopolis (JP)</option>
            <option>Tsukuba Circuit (JP)</option>
            <option>Mount Panorama (AU)</option>
        </select>
        <input type="date" id="r-date">
        <select id="r-pos"><option value="1">1° POSTO</option><option value="2">2° POSTO</option><option value="3">3° POSTO</option></select>
        <div class="check-container">
            <label class="check-item"><input type="checkbox" id="r-pole"> POLE</label>
            <label class="check-item"><input type="checkbox" id="r-gv"> GIRO VELOCE</label>
        </div>
        <button class="btn-blue" onclick="submitRace()">SALVA RISULTATO</button>
        <button onclick="closeModal('mRace')" style="background:none; border:none; color:grey; width:100%; cursor:pointer; margin-top:10px;">Annulla</button>
    </div></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwhVTmyGT5w0GXKq_Tns4WPsNlNy3mGfkHZsqvRJi9XUmxT20aeZ4x3y99owBnsO9W8iQ/exec";
        let pilotData = [];

        window.onload = () => {
            const u = localStorage.getItem("dct_user"), p = localStorage.getItem("dct_pass");
            if(u && p) { document.getElementById('user').value = u; document.getElementById('pass').value = p; checkLogin(true); }
        };

        function checkLogin(isAuto = false) {
            const u = document.getElementById('user').value, p = document.getElementById('pass').value;
            if(u === "DCT_ADMIN" && p === "GAS100") {
                if(document.getElementById('remember').checked) { localStorage.setItem("dct_user", u); localStorage.setItem("dct_pass", p); }
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('main-dashboard').style.display = 'flex';
                load();
            } else if(!isAuto) alert("Credenziali Errate");
        }

        async function load() {
            document.getElementById('loading').style.display = 'flex';
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                pilotData = data.listaDropdown;

                document.getElementById('r-select').innerHTML = '<option value="">Scegli Pilota...</option>' + pilotData.map(p => `<option value="${p.nome}">${p.nome}</option>`).join('');

                document.getElementById('pBody').innerHTML = data.piloti.map(row => {
                    const flag = (row[2] || "un").substring(0,2).toLowerCase();
                    return `<tr>
                        <td>#${row[0]}</td>
                        <td style="font-weight:bold">${row[1]}</td>
                        <td><img src="https://flagcdn.com/w40/${flag}.png" class="flag"> ${row[2]}</td>
                        <td>${row[3]}</td>
                        <td>${row[4]}</td><td>${row[5]}</td><td>${row[6]}</td><td>${row[7]}</td>
                        <td style="font-weight:bold; color:var(--accent)">${row[8]}</td>
                        <td>
                            <button class="btn-action btn-edit" onclick="editDriver('${row[0]}','${row[1]}','${row[2]}','${row[3]}')">✏️</button>
                            <button class="btn-action btn-del" onclick="deleteDriver('${row[1]}')">🗑️</button>
                        </td>
                    </tr>`;
                }).join('');

                document.getElementById('hofBody').innerHTML = data.trofei.map(row => `
                    <div class="trophy-card">
                        <button class="btn-action btn-del" style="position:absolute; top:10px; right:10px;" onclick="deleteRace('${row[3]}','${row[4]}')">🗑️</button>
                        <p class="pos-giant p-${row[5]}">P${row[5]}</p>
                        <div class="driver-name">${row[3]}</div>
                        <div style="color:var(--accent); font-weight:bold; font-size:0.8rem;">${row[4]}</div>
                        <div class="race-date">📅 ${new Date(row[0]).toLocaleDateString('it-IT')}</div>
                    </div>`).join('');
            } catch(e) { console.error(e); }
            document.getElementById('loading').style.display = 'none';
        }

        function openAddModal() {
            document.getElementById('modal-title').innerText = "NUOVO PILOTA";
            document.getElementById('n-name').readOnly = false;
            document.getElementById('n-num').value = ""; document.getElementById('n-name').value = ""; document.getElementById('n-nat').value = "";
            openModal('mAdd');
        }

        function editDriver(num, name, nat, cat) {
            document.getElementById('modal-title').innerText = "MODIFICA PILOTA";
            document.getElementById('n-num').value = num;
            document.getElementById('n-name').value = name;
            document.getElementById('n-name').readOnly = true; 
            document.getElementById('n-nat').value = nat;
            document.getElementById('n-cat').value = cat;
            openModal('mAdd');
        }

        async function submitDriver() {
            const p = { action:"addDriver", num:document.getElementById('n-num').value, name:document.getElementById('n-name').value, nat:document.getElementById('n-nat').value, cat:document.getElementById('n-cat').value };
            if(!p.name || !p.num) return alert("Inserisci Nome e Numero!");
            document.getElementById('loading').style.display = 'flex';
            await fetch(SCRIPT_URL, {method:"POST", mode:"no-cors", body:JSON.stringify(p)});
            location.reload();
        }

        async function deleteDriver(name) {
            if(!confirm("Eliminare definitivamente " + name + "?")) return;
            document.getElementById('loading').style.display = 'flex';
            await fetch(SCRIPT_URL, {method:"POST", mode:"no-cors", body:JSON.stringify({action:"deleteDriver", name:name})});
            setTimeout(() => location.reload(), 1500);
        }

        async function deleteRace(driver, event) {
            if(!confirm("Eliminare questa gara? I punti verranno stornati dal pilota.")) return;
            document.getElementById('loading').style.display = 'flex';
            await fetch(SCRIPT_URL, {method:"POST", mode:"no-cors", body:JSON.stringify({action:"deleteRace", name:driver, event:event})});
            setTimeout(() => location.reload(), 1500);
        }

        async function submitRace() {
            const ev = document.getElementById('r-event').value || "Evento";
            const tr = document.getElementById('r-track').value || "Pista";
            const p = {
                action: "addRace",
                name: document.getElementById('r-select').value,
                num: document.getElementById('r-num').value,
                event: ev + " | " + tr,
                date: document.getElementById('r-date').value,
                pos: document.getElementById('r-pos').value,
                pole: document.getElementById('r-pole').checked ? "SI" : "NO",
                gv: document.getElementById('r-gv').checked ? "SI" : "NO"
            };
            if(!p.name || !p.date) return alert("Dati mancanti!");
            document.getElementById('loading').style.display = 'flex';
            await fetch(SCRIPT_URL, {method:"POST", mode:"no-cors", body:JSON.stringify(p)});
            location.reload();
        }

        function autoFillNum() {
            const sel = document.getElementById('r-select').value;
            const p = pilotData.find(x => x.nome === sel);
            document.getElementById('r-num').value = p ? p.numero : "";
        }

        function showTab(t) {
            document.getElementById('tab-db').style.display = t === 'db' ? 'block' : 'none';
            document.getElementById('tab-hof').style.display = t === 'hof' ? 'block' : 'none';
            document.getElementById('btn-db').classList.toggle('active', t === 'db');
            document.getElementById('btn-hof').classList.toggle('active', t === 'hof');
        }
        function openModal(id) { document.getElementById(id).style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
